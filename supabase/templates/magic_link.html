<!doctype html>
<html>
  <body style="font-family: -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; color: #1f2430; margin: 0; padding: 24px;">
    <div style="max-width: 440px; margin: 0 auto;">
      <h1 style="font-size: 20px; margin: 0 0 8px;">Your Huddle sign-in code</h1>
      <p style="font-size: 15px; color: #5b6472; margin: 0 0 20px;">
        Enter this code to sign in. It expires shortly and can only be used once.
      </p>
      <div style="font-size: 34px; font-weight: 800; letter-spacing: 10px; background: #f3f1fb; color: #5b3df5; border-radius: 12px; padding: 18px; text-align: center;">
        {{ .Token }}
      </div>
      <p style="font-size: 13px; color: #8a94a6; margin: 20px 0 0;">
        If you didn’t request this, you can safely ignore this email.
      </p>
    </div>
  </body>
</html>
