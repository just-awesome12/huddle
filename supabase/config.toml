# Phase 0 Supabase config.
# Full reference: https://supabase.com/docs/guides/local-development/cli/config
project_id = "huddle"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = [
  "http://localhost:3000/**",
  "http://127.0.0.1:3000/**",
  "huddle://**"
]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
enable_confirmations = false  # turn on before launch; off for dev convenience

[storage]
enabled = true
file_size_limit = "10MiB"

[realtime]
enabled = true

[edge_runtime]
enabled = true
# "oneshot" recreates the worker on each request — best for local dev so
# edited functions are picked up without a manual restart.
policy = "oneshot"

# run_picker (Phase 7): server-side random pick + decisions insert.
# verify_jwt rejects unauthenticated calls at the gateway; the function
# still re-derives the user from the forwarded Authorization header.
[functions.run_picker]
enabled = true
verify_jwt = true

# send-push (Phase 8): invoked by Database Webhooks (pg_net), not users.
# verify_jwt is off; it authenticates via the x-huddle-webhook-secret
# header instead (dev fallback locally; HUDDLE_WEBHOOK_SECRET in prod).
[functions.send-push]
enabled = true
verify_jwt = false

[auth.external.google]
enabled = true
client_id = "env(SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID)"
secret = "env(SUPABASE_AUTH_EXTERNAL_GOOGLE_SECRET)"
redirect_uri = "http://127.0.0.1:54321/auth/v1/callback"
url = ""
skip_nonce_check = false