# Phase 0 Supabase config.
# Full reference: https://supabase.com/docs/guides/local-development/cli/config
project_id = "huddle"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = [
  "http://localhost:3000/**",
  "http://127.0.0.1:3000/**",
  "huddle://**"
]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
enable_confirmations = false  # turn on before launch; off for dev convenience

[storage]
enabled = true
file_size_limit = "10MiB"

[realtime]
enabled = true

# Phase 7 — the random picker. verify_jwt rejects anon callers at the
# gateway; the function additionally re-checks group membership via RLS.
[functions.run-picker]
enabled = true
verify_jwt = true

[auth.external.google]
enabled = true
client_id = "env(SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID)"
secret = "env(SUPABASE_AUTH_EXTERNAL_GOOGLE_SECRET)"
redirect_uri = "http://127.0.0.1:54321/auth/v1/callback"
url = ""
skip_nonce_check = false