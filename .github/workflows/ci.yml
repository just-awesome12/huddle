name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9.15.0'
  # Pin the Supabase CLI to the version used locally (lesson 7 — don't
  # drift mid-project). gen-types isn't run in CI, so the 2.106 gen-types
  # auth quirk (lesson 20) doesn't apply here.
  SUPABASE_CLI_VERSION: '2.106.0'

jobs:
  # Fast, no-infra gate: formatting, lint, types, and the unit suites
  # (vitest needs no database).
  verify:
    name: Format, lint, typecheck, unit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Format check
        run: pnpm format:check
      - name: Lint
        run: pnpm lint
      - name: Typecheck
        run: pnpm typecheck
      - name: Unit tests (vitest)
        run: pnpm test

  # Heavy gate: spins up the local Supabase stack (Postgres + Auth +
  # Realtime + Storage + Edge Functions) for pgTAP, the live integration
  # probes, and the Playwright E2E suite.
  integration:
    name: pgTAP, probes, E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # Local Supabase emits deterministic demo keys, so they're safe to
      # inline for CI against the local stack (same posture as D35 test
      # keys). The probes default to these same demo keys.
      NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: sb_publishable_ACJWlzQHlZjBrEguHvfOxg_3BJgxAaH
      NEXT_PUBLIC_TURNSTILE_TEST_MODE: 'true'
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: 1x00000000000000000000AA
      TURNSTILE_SECRET_KEY: 1x0000000000000000000000000000000AA
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: ${{ env.SUPABASE_CLI_VERSION }}

      - name: Start Supabase (migrations + seed + edge functions)
        run: supabase start

      - name: pgTAP
        run: supabase test db

      - name: Live integration probes
        run: |
          node packages/api-client/tests/realtime-rls.integration.mjs
          node supabase/functions/run_picker/run_picker.integration.mjs
          node supabase/functions/send-push/send_push.integration.mjs
          node supabase/functions/delete-account/delete_account.integration.mjs

      - name: Web env for Playwright
        run: |
          cat > apps/web/.env.local <<EOF
          NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY}
          NEXT_PUBLIC_TURNSTILE_TEST_MODE=${NEXT_PUBLIC_TURNSTILE_TEST_MODE}
          NEXT_PUBLIC_TURNSTILE_SITE_KEY=${NEXT_PUBLIC_TURNSTILE_SITE_KEY}
          TURNSTILE_SECRET_KEY=${TURNSTILE_SECRET_KEY}
          EOF

      - name: Install Playwright browser
        run: pnpm --filter web exec playwright install --with-deps chromium

      - name: Web E2E (Playwright)
        run: pnpm --filter web test:e2e

      - name: Stop Supabase
        if: always()
        run: supabase stop || true
